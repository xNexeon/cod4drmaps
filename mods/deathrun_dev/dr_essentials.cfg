//--------------------------------------------------------
//	Deathrun Essentials - by GCZ|Slaya (JR-Imagine)
//	Extended with role-based menus
//	Roles: Owner > Co-Owner > Admin > VIP > Player
//--------------------------------------------------------

set plugin_essentials_menu_enable 1 // Enables the Essentials Menu
set plugin_essentials_menu_points_enable 1 // Enables the points system and shop items
set plugin_essentials_menu_points_max 256 // Integer between 0-256 (Stats won't save numbers above 256 :/)

//Shop Item Prices
set plugin_price_m9 20
set plugin_price_m1911 25
set plugin_price_usp 25
set plugin_price_deagle 30
set plugin_price_gold_deagle 30
set plugin_price_colt44 30
set plugin_price_m40a3 30
set plugin_price_r700 30

// Tomahawk vars (Plugin by Rycoon)
set plugin_tomahawk_enable 0			//1 = Enable throwing tomahawks | 0 = Disable throwing tomahawks
set plugin_tomahawk_activator_amount 0		//how many tomahawks should the activator have to throw ( 0-8 )
set plugin_tomahawk_jumper 0			//should jumpers also have a tomahawk at spawn? 1 = Yes | 0 = No
set plugin_tomahawk_jumper_amount 0		//how many should they have then to throw? ( 0-8 )
set plugin_tomahawk_damage 150			//damage of a throwing tomahawk

set plugin_tomahawk_empty 1
//when you threw all in your inventory available tomahawks then:
//1 = the tomahawk in your hand will be removed
//0 = the tomahawk will stay in your hand for further melee attacks
//NOTICE: activator might get totally unarmed and defenseless

set plugin_tomahawk_emptygun "knife"		//the weapon you will get when no weapons remain after tomahawk removed - add more separated by ";" for random
set plugin_tomahawk_autoswitch 1		//automatically switch to next weapon when tomahawk is removed
set plugin_tomahawk_collect 1			//1 = players can pickup thrown tomahawks | 0 = thrown tomahawks just lay on ground
set plugin_tomahawk_last 30			//the time a thrown tomahawk will last ( in seconds )

set plugin_healthbar_enable 1  //1 = Enable | 0 = Disable

set plugin_disco_enable 1 //Enables Disco/Party mode at the end of each round

set plugin_guid_spoofing_enable 1 // 1 = Enable GUID Spoofing Protection | 0 = Disable

set plugin_no_double_music 1 // 1 = Prevent double music | 0 = Do not prevent

set plugin_killcam_enable 1		//0 = Disable Killcam | 1 = Enable Killcam
set plugin_killcam_thirdperson 0	//0 = First person during killcam | 1 = Third person during killcam
set plugin_killcam_blur 0.0		//blur of screen: 0.0 - 5.0 ( Float )

set plugin_killcam_show 2
//Killcam will be shown only when:
//0 = Jumper killed Activator
//1 = Activator killed last Jumper
//2 = Always

set plugin_rtd_enable 1 // Enables Roll the Dice

set plugin_antiwallbang_enable 1 // Enables Anti-Wallbang

set antiafk_enable "1"				//1 = Enable this plugin | 0 = Disable
set antiafk_traps "1"				//1 = Server will activate traps. 0 = Pick new activator instead
set antiafk_warn "10"				//seconds before activator is warned they are AFK
set antiafk_time "15"				//seconds before action is taken against AFK activator
set antiafk_team "1"				//0 = move AFK activator to jumpers | 1 = move to spectator
set antiafk_trapdelay "5"			//seconds between each trap activation by server
set antiafk_teleporttotraps "1"			//0 = Don't teleport activator to trap. 1 = Teleport (WARNING: can be buggy)
set antiafk_wmessage "^7Move your ^1ASS^7!"	//The warning message sent to the AFK activator

//------------------------------------------------------------
// ROLE SYSTEM
// GUIDs are defined in dr_essentials.gsc under EssentialsMenu_init().
// The entries below are for reference only and are NOT read by the GSC.
// Edit the arrays in the .gsc file directly to add/remove players.
//
// Current owners  (role_owners):    84832824, 45153247
// Current coowners (role_coowners): 44243664, 74934544
// Admins and VIPs: add in the .gsc role arrays
//------------------------------------------------------------

//------------------------------------------------------------
// WARN / BAN SYSTEM
// These dvars are used by the Admin "Warn" action in dr_essentials.gsc.
// warns_stat  = the player stat slot used to store warn count (do not clash with other stats)
// warns_max   = number of warnings before auto-ban is triggered
//------------------------------------------------------------
set warns_stat 800
set warns_max 3

//------------------------------------------------------------
// MAP VOTING / ACTIVATOR PICK BEHAVIOUR
// Used internally by the GSC -- adjust with caution.
//------------------------------------------------------------
set dont_make_peoples_angry 1	//1 = avoid picking the same activator twice in a row
set dont_pick_spec 1		//1 = never pick spectators as activator
set round_limit 0		//0 = no limit. Killcam is disabled when round_limit is reached.

